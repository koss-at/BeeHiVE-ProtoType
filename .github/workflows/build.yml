name: build-binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"
      - run: yarn install --frozen-lockfile
      - run: yarn dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: BeeHiVE-mac
          path: |
            dist/*.dmg
            dist/*.zip

  win:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"
      - run: yarn install --frozen-lockfile
      - run: yarn dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: BeeHiVE-win
          path: |
            dist/*.exe
